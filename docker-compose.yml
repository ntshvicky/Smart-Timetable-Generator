services:
  backend:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./backend:/app/backend
      - ./.env:/app/.env:ro
    command: sh -c "pip install -r backend/requirements.txt && PYTHONPATH=backend uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
  frontend:
    image: node:22-alpine
    working_dir: /app/frontend
    volumes:
      - ./frontend:/app/frontend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      - VITE_API_BASE=http://localhost:8000
    ports:
      - "5173:5173"
